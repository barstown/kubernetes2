name: test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - ".devcontainer/*"
      - ".editorconfig"
      - ".github/*"
      - ".gitignore"
      - ".sops.yaml"
      - ".vale.ini"
      - ".vscode/*"
      - "*/README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "renovate.json"
  # push:
  #   branches: [ '*' ]
  #   tags-ignore: [ '*' ]

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@978262ecd0f3caca9b5bda5791a8fa83c5b31f61 # main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@978262ecd0f3caca9b5bda5791a8fa83c5b31f61 # main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@978262ecd0f3caca9b5bda5791a8fa83c5b31f61 # main
      - name: Validate manifests
        run: ./scripts/validate.sh
